<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription API Test</title>
</head>
<body>
    <h1>Subscription API Test</h1>
    <div>
        <h2>Get User Subscription</h2>
        <button id="getSubscriptionBtn">Get Subscription</button>
        <div id="subscriptionResult"></div>
    </div>
    
    <div>
        <h2>Get Subscription Plans</h2>
        <button id="getPlansBtn">Get Plans</button>
        <div id="plansResult"></div>
    </div>

    <script>
        // First, we need to login to get a token
        let accessToken = localStorage.getItem('accessToken');
        
        // Login function
        async function login() {
            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: 'admin@bazaarconnect.com', 
                        password: 'admin123456' 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    accessToken = data.data.accessToken;
                    localStorage.setItem('accessToken', accessToken);
                    document.getElementById('subscriptionResult').innerHTML = 
                        `<p style="color: green;">✅ Login successful! Token obtained.</p>`;
                } else {
                    document.getElementById('subscriptionResult').innerHTML = 
                        `<p style="color: red;">❌ Login failed: ${data.message}</p>`;
                }
            } catch (error) {
                document.getElementById('subscriptionResult').innerHTML = 
                    `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        }
        
        // Get subscription
        document.getElementById('getSubscriptionBtn').addEventListener('click', async () => {
            if (!accessToken) {
                await login();
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/api/payments/subscription', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    }
                });
                
                const data = await response.json();
                const resultDiv = document.getElementById('subscriptionResult');
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <h3>Subscription Retrieved Successfully!</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h3>Subscription Request Failed!</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                document.getElementById('subscriptionResult').innerHTML = 
                    `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        });
        
        // Get subscription plans
        document.getElementById('getPlansBtn').addEventListener('click', async () => {
            try {
                const response = await fetch('http://localhost:8000/api/payments/plans', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const data = await response.json();
                const resultDiv = document.getElementById('plansResult');
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <h3>Subscription Plans Retrieved Successfully!</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h3>Plans Request Failed!</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                document.getElementById('plansResult').innerHTML = 
                    `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
